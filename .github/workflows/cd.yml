name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy to GCE via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 34.45.54.7 >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key jeong-yeongjun@34.45.54.7 '
            cd ~/live-or-leave &&
            git pull origin main &&
            docker compose up -d --build
          '
